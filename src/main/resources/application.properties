spring.main.banner-mode=off
spring.main.log-startup-info=false

# --- Prediction Weights ---
# ELO scale divisor: 400 is the standard chess/FIFA value (also used by FIFA official rankings).
# A lower number exaggerates the gap between strong and weak teams.
elo.scale.divisor=400.0

# --- Qualification Form ---
# Maximum ELO bonus/penalty for qualification form.
# A team that wins all qualifiers convincingly gets ~+75 ELO (+10.6% win prob).
# Calibrated so qual form is the 3rd most impactful signal (behind home advantage 100
# and critical injury 90). Sustained competitive form over 2+ years deserves significant
# weight. Hosts receive 0 qual form (no qualifiers), so this naturally counterbalances
# home advantage - a team in brilliant form can genuinely overcome a host's home boost.
qual.form.elo.max=100

# --- Pre-Tournament Form (last 5 friendlies) ---
# ELO bonus/penalty for recent friendly form, capped at +/-38 (+5.4% win prob).
# Set at 50% of qual.form.elo.max (50 = 100 x 0.5) - friendlies carry weaker signal
# than competitive qualifiers but still reflect current momentum and fitness.
pre.tournament.form.elo.max=50

# --- Group Stage Adjustments ---

# Home advantage: +100 ELO (+14.0% win prob vs neutral)
# Confirmed as the standard by World Football Elo Ratings, FIFA ranking methodology, and
# empirical studies across decades of international matches. Effect is stronger in Africa
# and South America, slightly weaker in modern European play.
group.home.advantage.elo=100

# Injury penalties: reflect real loss of players from the expected squad.
# Research shows missing a key player reduces win prob by 5-15% depending on position/quality.
# Minor (-22 ELO, -3.2%): one or two fringe/rotation players ruled out.
# Significant (-45 ELO, -6.4%): a genuine starter or important squad player missing.
# Critical (-90 ELO, -12.7%): multiple starters or one truly irreplaceable player out.
# Set at 90: close to but just below home advantage (100 = 14.3%) since losing multiple
# starters is severe but not quite as impactful as full home-crowd advantage.
group.injury.penalty.minor=22
group.injury.penalty.significant=45
group.injury.penalty.critical=90

# Heat/climate advantage: benefit for teams acclimatised to hot, humid conditions.
# Research (Climate Central 2026): 97% of WC26 matches will be in performance-impairing heat
# (>28 degrees C), reducing sprint frequency, total distance, and increasing fatigue errors.
# Teams from hot climates (Mexico, Morocco, Senegal, Ivory Coast) have a measurable edge.
# Raised moderate and strong after WC2026-specific heat research confirmed scale of impact.
# Mild (+9 ELO, +1.3%): slight historical preference for warmth, minor benefit.
# Moderate (+18 ELO, +2.6%): clear adaptation - team regularly plays/trains in heat.
#   Raised from 15 -> 18 after research showed heat impact more significant than initially set.
# Strong (+35 ELO, +5.0%): dominant climate advantage (e.g. Mexico in Guadalajara humidity,
#   Morocco/Ivory Coast/Senegal/South Africa used to extreme heat year-round).
#   Raised from 25 -> 35 given 97% of WC26 games in dangerous heat conditions.
group.heat.advantage.mild=9
group.heat.advantage.moderate=18
group.heat.advantage.strong=35

# Dropout penalties - for players not in the final squad due to non-injury reasons
# (discipline, omission, form, retirement). Differ from injuries because:
#   (a) coach had time to adapt tactics and selections, and
#   (b) the absence is often not a surprise by tournament day.
# Minor (-18 ELO, -2.6%): one notable player absent.
# Significant (-35 ELO, -5.0%): several key players missing, clear tactical impact.
# Critical (-70 ELO, -9.9%): catastrophic squad disruption (e.g. Netherlands 2026:
#   Xavi Simons ACL, de Ligt surgery, de Vrij injured, Schouten ACL, Frimpong omitted).
# Set at 70 (not 90) - planned absences allow tactical adaptation; 20 ELO gap vs
# injury critical reflects that coaches had weeks to adjust shape and selection.
group.squad.dropout.penalty.minor=18
group.squad.dropout.penalty.significant=35
group.squad.dropout.penalty.critical=70

# Minimum ELO score gap to call a group position "yes" (vs "maybe")
group.confidence.gap=25

# Squad age penalty - applied when squad composition skews significantly old or young.
# Peak player age in international football is broadly 24-28; decline accelerates after 30.
# Research: sprint ability declines ~8% per year after 30; recovery between matches
# worsens significantly at 33+; players 35+ need careful match management.
#
# Young (-12 ELO, -1.7%): unusually young/inexperienced squad lacking big-tournament know-how.
#   Raised slightly from 10 -> 12; inexperience is real but physical peak mitigates some risk.
#
# Aging (-8 ELO, -1.2%): squad with multiple key starters 33+ and a physically declining core.
#   NOTE: Under review - may raise to 15 to better reflect physical decline at 38-40
#   (Bosnia: Dzeko 40; Croatia: Modric 40, Perisic 37; Qatar: Soria 42).
#   Currently kept modest because base ELO already captures recent declining results.
squad.age.young.elo=12
squad.age.aging.elo=8

# Squad cohesion penalty - for disruption to team chemistry, tactics, or trust.
# Research (Carron et al. meta-analysis): cohesion is one of the STRONGEST predictors
# of team-sport performance. International teams are especially vulnerable because
# they have far less prep time than club sides to rebuild cohesion after disruption.
# Mid-cycle coaching changes cause role ambiguity, morale uncertainty, and tactical reset.
# Decided to keep this as a NEGATIVE-ONLY signal: positive cohesion is already priced
# into a team's base ELO (stable squads produce stable results over time).
#
# Normal (0):       default - no notable disruption.
# Unsettled (-11 ELO, -1.6%): minor disruption - late reshuffles, new faces, slight tension,
#   first tournament under current coach (e.g. Czechia, Canada, USA, Saudi Arabia).
# Disrupted (-22 ELO, -3.2%): serious disruption - new coach mid-cycle, major selection rows,
#   squad divisions (e.g. Morocco: new coach March 2026; Sweden: Potter mid-qualification).
# Fractured (-45 ELO, -6.4%): extreme breakdown - political crisis, war, player boycotts,
#   or complete institutional dysfunction (e.g. Iran 2026: war stopped domestic league,
#   17 players without recent match time, forced base camp change).
squad.cohesion.unsettled.elo=11
squad.cohesion.disrupted.elo=22
squad.cohesion.fractured.elo=45

# Squad depth penalty - applied when a team's replacement quality is significantly below average.
# Separate from injuries/dropouts: captures structural pool depth at the nation level.
# Limited (-10 ELO, -1.4%): smaller nations where bench quality drops sharply (e.g. Jordan, Panama).
# Thin (-20 ELO, -2.9%): minnow-level depth - first World Cup nations, tiny pools (e.g. Haiti,
#   Curacao, New Zealand, Cape Verde) where even 1-2 injuries could be devastating.
squad.depth.limited.elo=10
squad.depth.thin.elo=20

# Squad quality bonus - forward-looking signal for squads whose CURRENT talent visibly
# exceeds what their base ELO (a backward-looking results average) implies.
# Intentionally small to avoid double-counting with ELO, which already prices in team quality.
# Use only when a squad has a genuinely exceptional current cycle above their historical baseline.
# Good (+10 ELO, +1.4%): strong squad with several world-class players across key positions.
# Exceptional (+20 ELO, +2.9%): generational squad quality - France, Spain, Argentina level.
squad.quality.good.elo=10
squad.quality.exceptional.elo=20

# --- Betting Labels ---
# Minimum ELO win % for a team to be considered a candidate
betting.candidate.min.pct=40
# Minimum ELO win % for a risky candidate (below candidate.min.pct threshold)
betting.risky.min.pct=30
# Minimum net winnings (per GBP 10 stake) for each label tier
betting.strong.candidate.min.profit=20.0
betting.candidate.min.profit=10.0
betting.weak.candidate.min.profit=5.0
betting.moonshot.min.profit=20.0

# --- Path Fatigue ---
# Fatigue accumulates from the quality of opponents already beaten in this tournament.
# Formula per opponent: rawScore = opponentElo - tournamentAvgElo
#                       weighted  = rawScore x stageMult
# Cumulative across all prior rounds: fatigueElo = (cumulativeTotal / 100) x -eloFactor
# Positive values (easy path) are capped at 0 - fatigue can only be absent or present,
# an easy bracket is not a rest bonus.
#
# tournament.avg.elo - baseline used as "neutral" opponent quality.
#   1850 = approximate tournament field average (ranges from ~1550 for minnows to ~2100 for top seeds).
path.fatigue.tournament.avg.elo=1850
#
# elo.factor - how many ELO points each 100 units of weighted path pressure costs.
#   12 = one hard game above average opponent (e.g. 1950 vs 1850 x last_16 x1.0 = 100pts -> -12 ELO).
#   Calibrated so a single brutal last_8 game (~+300 weighted) costs ~ -36 ELO, and a full
#   hard bracket (last_32+last_16+last_8 ~ +625 weighted) costs ~ -75 ELO.
path.fatigue.elo.factor=12
#
# Stage multipliers - later rounds count more because teams have played more games by then
#   and the intensity of each win matters more coming into bigger matches.
#   group   x0.25: group-stage load carried into the first knockout match
#   last_32 x0.5: early round, squad still fresh, bench minutes available
#   last_16 x1.0: baseline - full knockout intensity, first team heavily involved
#   last_8  x1.2: quarter-final pressure, rotation harder, legs heavier
#   last_4  x1.5: semi-final, virtually no rotation, fatigue at peak
path.fatigue.stage.group.multiplier=0.25
path.fatigue.stage.last32.multiplier=0.5
path.fatigue.stage.last16.multiplier=1.0
path.fatigue.stage.last8.multiplier=1.2
path.fatigue.stage.last4.multiplier=1.5
#
# Bench-depth fatigue multipliers - applied only to negative fatigue ELO values.
# Good/deep squads absorb hard knockout paths better; limited/thin squads absorb them worse.
# Easy paths still cap at 0, so depth never creates a rest bonus.
path.fatigue.depth.good.multiplier=0.85
path.fatigue.depth.limited.multiplier=1.15
path.fatigue.depth.thin.multiplier=1.30
