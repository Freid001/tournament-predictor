spring.main.banner-mode=off
spring.main.log-startup-info=false

# ─── Prediction Weights ─────────────────────────────────────────────────────
# Combined prediction formula:
#   finalPct = elo.weight * ELO + qual.form.weight * QualificationForm
#   Teams with no qual data (e.g. hosts): 100% ELO
#
# Default split: 85% ELO + 15% qualification form
prediction.elo.weight=0.85

# Qualification form weight: how much weight to give a team's recent qualification
# campaign performance (win rate + goal difference). Captures recent momentum
# that ELO smooths over due to its accumulated history.
# 0.0 disables this signal; default 0.15.
# Note: host nations (who skip qualification) default to 100% ELO.
prediction.qual.form.weight=0.15

# 400 is the standard chess/FIFA ELO value — not recommended to change this.
# A lower number exaggerates the gap between strong and weak teams; higher makes outcomes feel more like a coin flip.
elo.scale.divisor=400.0

# ─── Head-to-Head Decay ──────────────────────────────────────────────────────
# How quickly old results lose relevance. A match played N years ago is weighted
# by exp(-ln(2)/halfLife * N), so a result from exactly this many years ago
# counts for only 50% of a recent result. 5 = results from 5 years ago are half as influential.
h2h.decay.half.life.years=5.0

# ─── Group Stage Adjustments ─────────────────────────────────────────────────
# ELO bonus applied to the host nation
group.home.advantage.elo=100
# ELO penalties for injury levels: minor / significant / critical
group.injury.penalty.minor=25
group.injury.penalty.significant=50
group.injury.penalty.critical=100
# ELO bonuses for heat adaptation levels: mild / moderate / strong
group.heat.advantage.mild=8
group.heat.advantage.moderate=15
group.heat.advantage.strong=25
# ELO penalties for squad dropout levels: minor / significant / critical
group.squad.dropout.penalty.minor=20
group.squad.dropout.penalty.significant=40
group.squad.dropout.penalty.critical=75
# Minimum ELO score gap to call a group position "yes" (vs "maybe")
group.confidence.gap=25

# ─── Betting Labels ──────────────────────────────────────────────────────────
# Minimum ELO win % for a team to be considered a candidate
betting.candidate.min.pct=40
# Minimum ELO win % for a risky candidate (below candidate.min.pct threshold)
betting.risky.min.pct=30
# Minimum net winnings (per £10 stake) for each label tier
betting.strong.candidate.min.profit=20.0
betting.candidate.min.profit=10.0
betting.weak.candidate.min.profit=5.0
betting.moonshot.min.profit=20.0
