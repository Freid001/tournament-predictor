<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1" th:text="${tournament.label}">World Cup 2026</h1>
            <p class="text-muted mb-0" th:text="${tournament.stage}">Team Setup complete</p>
        </div>
        <a class="btn btn-outline-secondary" href="/">Back</a>
    </div>

    <div th:if="${refreshMessage}" class="alert alert-info py-2 mb-3" th:text="${refreshMessage}">Update saved.</div>

    <div class="list-group shadow-sm">
        <div class="list-group-item" th:each="stage : ${stages}">
            <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center">
                <div>
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <span th:text="${stage.status.icon}">✅</span>
                        <strong th:text="${stage.label}">Last 32</strong>
                        <span class="badge" th:classappend="${' text-bg-' + stage.status.badge}" th:text="${stage.status.text}">Ready</span>
                    </div>
                    <div class="text-muted small" style="white-space: pre-line" th:text="${stage.description}">Description</div>
                </div>
                <div class="d-flex flex-wrap gap-2">
                    <form th:if="${stage.canRun}" th:action="@{/run/{mode}(mode=${stage.runMode}, tournament=${tournament.name})}" method="post" class="d-inline" th:attr="data-confirm-message=${stage.runMode == 'snapshot-refresh' ? 'Refreshing now will first update the shared current ELO history, then freeze this tournament snapshot. Generated group rankings and tournament results will be cleared, but your team setup will remain saved. Matches played on or after the tournament start date are excluded. Do you want to continue?' : null}">
                        <button class="btn btn-sm" th:classappend="${stage.runButtonClass}" type="submit" th:text="${stage.runLabel}">Review</button>
                    </form>
                    <a th:if="${stage.canView}" class="btn btn-outline-primary btn-sm" th:href="${stage.viewUrl}">View</a>
                    <a th:if="${stage.canLoadActual}" class="btn btn-outline-primary btn-sm" th:href="${stage.loadActualUrl}" th:classappend="${stage.loadActualUrl == '#'} ? ' disabled' : ''">Refresh</a>
                    <a th:if="${stage.canView2}" class="btn btn-outline-primary btn-sm" th:href="${stage.viewUrl2}" th:text="${stage.viewLabel2}">View Rankings</a>
                    <a th:if="${stage.canEdit}" class="btn btn-outline-secondary btn-sm" th:href="${stage.editUrl}"
                       th:text="${stage.label == 'Team Setup' ? 'Edit' : 'Results'}">Edit</a>
                    <a th:if="${stage.canReset}" class="btn btn-outline-danger btn-sm" th:href="${stage.resetUrl}">Reset</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
  document.querySelectorAll('form[data-confirm-message]').forEach(function(form) {
    form.addEventListener('submit', function(event) {
      var message = form.getAttribute('data-confirm-message');
      if (message && !window.confirm(message)) event.preventDefault();
    });
  });

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft') location.href = '/';
  });
</script>
</body>
</html>
