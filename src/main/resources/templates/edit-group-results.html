<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">
    <div th:replace="~{fragments :: editHeader}"></div>

    <div class="alert alert-info py-2 mb-3">
        Enter group match results as the games happen. Group winners and runners-up can be derived later from these saved match results.
    </div>

    <form th:action="@{/edit/group-results(tournament=${tournament})}" method="post">
        <input type="hidden" name="rowCount" th:value="${#lists.size(rows)}">

        <div th:each="entry : ${groupedRows}" class="mb-4">
            <div class="mb-2">
                <h2 class="h5 mb-0" th:text="${'Group ' + entry.key}">Group A</h2>
            </div>
            <div class="table-responsive shadow-sm rounded border">
                <table class="table table-striped table-sm mb-0 align-middle w-100">
                    <thead class="table-dark">
                    <tr>
                        <th style="width:90px">Match</th>
                        <th>Fixture</th>
                        <th style="width:160px">Predicted</th>
                        <th style="width:160px">Winner</th>
                        <th style="width:180px">Score</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${entry.value}">
                        <td>
                            <input type="hidden" th:name="${'group' + row.rowIndex}" th:value="${row.group}">
                            <input type="hidden" th:name="${'matchId' + row.rowIndex}" th:value="${row.matchId}">
                            <input type="hidden" th:name="${'team1' + row.rowIndex}" th:value="${row.team1}">
                            <input type="hidden" th:name="${'team2' + row.rowIndex}" th:value="${row.team2}">
                            <span class="fw-semibold" th:text="${row.matchId}">M1</span>
                        </td>
                        <td>
                            <span th:utext="${row.team1Html}">Team 1</span>
                            <span class="text-muted px-2">vs</span>
                            <span th:utext="${row.team2Html}">Team 2</span>
                        </td>
                        <td class="text-muted small" th:text="${row.predictedOutcome}">Draw (35%)</td>
                        <td>
                            <select class="form-select form-select-sm" th:name="${'winner' + row.rowIndex}">
                                <option value="" th:selected="${row.winner == null or row.winner.isBlank()}">—</option>
                                <option th:value="${row.team1}" th:selected="${row.winner == row.team1}" th:text="${row.team1}">Team 1</option>
                                <option value="Draw" th:selected="${row.winner == 'Draw'}">Draw</option>
                                <option th:value="${row.team2}" th:selected="${row.winner == row.team2}" th:text="${row.team2}">Team 2</option>
                            </select>
                        </td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <input class="form-control form-control-sm" style="max-width:72px" inputmode="numeric" th:name="${'homeScore' + row.rowIndex}" th:value="${row.homeScore}" placeholder="0">
                                <span class="text-muted">-</span>
                                <input class="form-control form-control-sm" style="max-width:72px" inputmode="numeric" th:name="${'awayScore' + row.rowIndex}" th:value="${row.awayScore}" placeholder="0">
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <button class="btn btn-primary" type="submit">Save Group Results</button>
    </form>
</div>
<th:block th:replace="~{fragments :: keyboardNavScript}"></th:block>
</body>
</html>
