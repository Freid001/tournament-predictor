<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tournament Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <style>
        pre { white-space: pre-wrap; font-size: 0.9rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container"><a class="navbar-brand" href="/">🏆 Tournament Predictor</a></div>
</nav>
<div class="container pb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1" th:text="${mode}">Last 32</h1>
            <p class="text-muted mb-0" th:text="${tournament}">world_cup_2026</p>
        </div>
        <div class="d-flex gap-2">
            <a th:if="${editUrl != null}" class="btn btn-outline-secondary" th:href="${editUrl}">Edit</a>
            <a class="btn btn-outline-secondary" th:href="@{/tournament/{name}(name=${tournament})}">Back to tournament</a>
            <a th:if="${hasPrevRound}" th:href="${prevViewEnabled ? prevViewUrl : '#'}"
               th:text="${prevViewLabel}"
               th:classappend="${prevViewEnabled ? '' : ' disabled'}"
               th:attr="aria-disabled=${!prevViewEnabled}, tabindex=${!prevViewEnabled ? '-1' : ''}"
               class="btn btn-outline-primary">Back to Previous</a>
            <a th:if="${hasNextRound}" th:href="${nextViewEnabled ? nextViewUrl : '#'}"
               th:text="${nextViewLabel}"
               th:classappend="${nextViewEnabled ? '' : ' disabled'}"
               th:attr="aria-disabled=${!nextViewEnabled}, tabindex=${!nextViewEnabled ? '-1' : ''}"
               class="btn btn-primary">Next</a>
        </div>
    </div>
    <div th:utext="${output}"></div>
</div>
<script th:if="${hasPrevRound or hasNextRound}">
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft' && [[${prevViewEnabled}]]) location.href = '[[${prevViewUrl}]]';
    if (e.key === 'ArrowRight' && [[${nextViewEnabled}]]) location.href = '[[${nextViewUrl}]]';
  });
</script>
</body>
</html>
