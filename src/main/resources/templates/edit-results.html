<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">
    <div th:replace="~{fragments :: editHeader}"></div>

    <div class="alert alert-info py-2 mb-3">
        Enter results as the tournament progresses. Blank rows are ignored when you save.
    </div>

    <form th:action="${selectedRound != null and !selectedRound.isBlank()} ? @{/edit/results(tournament=${tournament}, round=${selectedRound})} : @{/edit/results(tournament=${tournament})}" method="post">
        <div th:each="roundView : ${rounds}" class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h2 class="h5 mb-0" th:text="${roundView.label}">Last 16</h2>
                <span class="text-muted small" th:text="${roundView.round}">last_16</span>
            </div>
            <input type="hidden" th:name="${'rowCount_' + roundView.round}" th:value="${#lists.size(roundView.rows)}">
            <div class="table-responsive shadow-sm rounded border">
                <table class="table table-striped table-sm mb-0 align-middle w-100">
                    <thead class="table-dark">
                    <tr>
                        <th style="width:96px">Match</th>
                        <th>Team 1</th>
                        <th>Team 2</th>
                        <th style="width:180px">Winner</th>
                        <th style="width:92px" class="text-center">Home</th>
                        <th style="width:92px" class="text-center">Away</th>
                        <th style="width:92px" class="text-center">Pens</th>
                        <th>Note</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row : ${roundView.rows}">
                        <td>
                            <input type="hidden" th:name="${'matchId_' + roundView.round + '_' + row.rowIndex}" th:value="${row.matchId}">
                            <input type="hidden" th:name="${'team1_' + roundView.round + '_' + row.rowIndex}" th:value="${row.team1}">
                            <input type="hidden" th:name="${'team2_' + roundView.round + '_' + row.rowIndex}" th:value="${row.team2}">
                            <span class="fw-semibold" th:text="${row.matchId}">M1</span>
                        </td>
                        <td th:utext="${row.team1Html}">Team 1</td>
                        <td th:utext="${row.team2Html}">Team 2</td>
                        <td>
                            <select class="form-select form-select-sm" th:name="${'winner_' + roundView.round + '_' + row.rowIndex}">
                                <option value="" th:selected="${row.winner == null or row.winner.isBlank()}">—</option>
                                <option th:value="${row.team1}" th:text="${row.team1}" th:selected="${row.winner == row.team1}"></option>
                                <option th:value="${row.team2}" th:text="${row.team2}" th:selected="${row.winner == row.team2}"></option>
                                <option value="Draw" th:selected="${row.winner == 'Draw'}">Draw</option>
                            </select>
                        </td>
                        <td><input class="form-control form-control-sm text-center" inputmode="numeric" th:name="${'homeScore_' + roundView.round + '_' + row.rowIndex}" th:value="${row.homeScore}" placeholder="0"></td>
                        <td><input class="form-control form-control-sm text-center" inputmode="numeric" th:name="${'awayScore_' + roundView.round + '_' + row.rowIndex}" th:value="${row.awayScore}" placeholder="0"></td>
                        <td class="text-center">
                            <input class="form-check-input mt-2" type="checkbox" th:name="${'penalties_' + roundView.round + '_' + row.rowIndex}" th:checked="${row.penalties}">
                        </td>
                        <td><input class="form-control form-control-sm" th:name="${'note_' + roundView.round + '_' + row.rowIndex}" th:value="${row.note}" placeholder="Optional note"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <button class="btn btn-primary" type="submit">Save Results</button>
    </form>
</div>
<th:block th:replace="~{fragments :: keyboardNavScript}"></th:block>
</body>
</html>
