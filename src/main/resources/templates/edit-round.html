<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">
    <div th:replace="~{fragments :: editHeader}"></div>

    <form th:action="@{/edit/{round}(round=${round}, tournament=${tournament})}" method="post">
        <input type="hidden" name="rowCount" th:value="${#lists.size(rows)}">

        <div th:if="${validationErrors != null and not #lists.isEmpty(validationErrors)}"
             class="alert alert-danger mb-3" role="alert">
            <strong>⚠️ Please fix the following before saving:</strong>
            <ul class="mb-0 mt-1">
                <li th:each="err : ${validationErrors}" th:text="${err}"></li>
            </ul>
        </div>

        <div th:if="${groupsMode}">
            <div th:each="entry : ${groupedRows}" class="mb-4">
                <h5 class="fw-semibold mb-2" th:text="${'Group ' + entry.key}">Group A</h5>
                <div class="table-responsive shadow-sm rounded border">
                    <table class="table table-striped table-sm mb-0 align-middle w-100">
                        <colgroup>
                            <col style="width:28px">
                            <col>
                            <col style="width:105px">
                            <col style="width:105px">
                            <col style="width:95px">
                            <col style="width:70px">
                        </colgroup>
                        <thead class="table-dark">
                        <tr>
                            <th aria-label="Details"></th>
                            <th>Team</th>
                            <th class="text-center" style="white-space:nowrap">Winner</th>
                            <th class="text-center" style="white-space:nowrap">Runner-up</th>
                            <th class="text-center" style="white-space:nowrap">3rd Place</th>
                            <th class="text-center" style="white-space:nowrap">Pos.</th>
                        </tr>
                        </thead>
                        <tbody>
                        <th:block th:each="row : ${entry.value}">
                        <tr class="group-main-row" style="cursor:pointer" onclick="toggleGroupDetail(this)">
                            <td class="text-center text-muted"><span class="expand-icon" aria-hidden="true"></span></td>
                            <td><span th:utext="${row.teamHtml}"></span></td>
                            <td class="text-center">
                                <select class="form-select form-select-sm group-pick" data-category="groupWinner" th:name="${'groupWinner' + row.rowIndex}" onclick="event.stopPropagation()">
                                    <option value="yes" th:selected="${row.groupWinner == 'yes'}">yes</option>
                                    <option value="maybe" th:selected="${row.groupWinner == 'maybe'}">maybe</option>
                                    <option value="no" th:selected="${row.groupWinner == 'no'}">no</option>
                                </select>
                            </td>
                            <td class="text-center">
                                <select class="form-select form-select-sm group-pick" data-category="runnerUp" th:name="${'runnerUp' + row.rowIndex}" onclick="event.stopPropagation()">
                                    <option value="yes" th:selected="${row.runnerUp == 'yes'}">yes</option>
                                    <option value="maybe" th:selected="${row.runnerUp == 'maybe'}">maybe</option>
                                    <option value="no" th:selected="${row.runnerUp == 'no'}">no</option>
                                </select>
                            </td>
                            <td class="text-center">
                                <select class="form-select form-select-sm group-pick" data-category="thirdPlace" th:name="${'thirdPlace' + row.rowIndex}" onclick="event.stopPropagation()">
                                    <option value="yes" th:selected="${row.thirdPlace == 'yes'}">yes</option>
                                    <option value="maybe" th:selected="${row.thirdPlace == 'maybe'}">maybe</option>
                                    <option value="no" th:selected="${row.thirdPlace == 'no'}">no</option>
                                </select>
                            </td>
                            <td class="text-center text-muted small" th:text="${row.predictedPosition}"></td>
                        </tr>
                        <tr th:replace="~{fragments :: groupDetailRow(6, ${row.breakdownHtml})}"></tr>
                        </th:block>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <button class="btn btn-primary mt-3" type="submit">Save Changes</button>
    </form>
<script>
document.querySelectorAll('select.group-pick').forEach(function(sel) {
    sel.addEventListener('change', function() {
        if (this.value !== 'yes') return;
        var category = this.dataset.category;
        var tbody = this.closest('tbody');
        tbody.querySelectorAll('select.group-pick[data-category="' + category + '"]').forEach(function(other) {
            if (other !== sel && other.value === 'yes') {
                other.value = 'maybe';
            }
        });
        checkGroupPickErrors(tbody);
    });
});
function checkGroupPickErrors(tbody) {
    ['groupWinner', 'runnerUp'].forEach(function(cat) {
        var sels = Array.from(tbody.querySelectorAll('select.group-pick[data-category="' + cat + '"]'));
        var yesCount = sels.filter(s => s.value === 'yes').length;
        sels.forEach(function(s) {
            s.classList.toggle('is-invalid', yesCount !== 1 && s.value === 'yes');
        });
    });
    // overlap: same row has both winner and runner-up = yes
    tbody.querySelectorAll('tr.group-main-row').forEach(function(row) {
        var w = row.querySelector('select[data-category="groupWinner"]');
        var r = row.querySelector('select[data-category="runnerUp"]');
        if (w && r && w.value === 'yes' && r.value === 'yes') {
            w.classList.add('is-invalid');
            r.classList.add('is-invalid');
        }
    });
}
// run on load so server-returned validation errors are highlighted immediately
document.querySelectorAll('tbody').forEach(checkGroupPickErrors);
</script>
<th:block th:replace="~{fragments :: toggleGroupDetailScript}"></th:block>
</div>
<th:block th:replace="~{fragments :: keyboardNavScript}"></th:block>
</body>
</html>
