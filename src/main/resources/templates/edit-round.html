<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tournament Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container"><a class="navbar-brand" href="/">🏆 Tournament Predictor</a></div>
</nav>
<div class="container pb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1" th:text="${'Edit ' + roundLabel}">Edit Last 32</h1>
            <p class="text-muted mb-0" th:text="${tournament}">world_cup_2026</p>
        </div>
        <div class="d-flex gap-2">
            <a th:if="${hasPrevView}" class="btn btn-outline-primary"
               th:href="${prevViewUrl}" th:text="${prevViewLabel}">View Groups</a>
            <a class="btn btn-outline-secondary" th:href="@{/tournament/{name}(name=${tournament})}">Back to Tournament</a>
        </div>
    </div>

    <form th:action="@{/edit/{round}(round=${round}, tournament=${tournament})}" method="post">
        <input type="hidden" name="rowCount" th:value="${#lists.size(rows)}">

        <div th:if="${groupsMode}">
            <div th:each="entry : ${groupedRows}" class="mb-4">
                <h5 class="fw-semibold mb-2" th:text="${'Group ' + entry.key}">Group A</h5>
                <div class="table-responsive shadow-sm rounded border">
                    <table class="table table-striped table-sm mb-0 align-middle w-100">
                        <colgroup>
                            <col style="width:28%">
                            <col style="width:22%">
                            <col style="width:17%">
                            <col style="width:17%">
                            <col style="width:16%">
                        </colgroup>
                        <thead class="table-dark">
                        <tr>
                            <th>Team</th>
                            <th>Predicted Position</th>
                            <th>Group Winner</th>
                            <th>Runner-up</th>
                            <th>3rd Place</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="row : ${entry.value}">
                            <td th:utext="${row.teamHtml}">Mexico</td>
                            <td th:text="${row.predictedPosition}">1 (74%)</td>
                            <td>
                                <select class="form-select form-select-sm" th:name="${'groupWinner' + row.rowIndex}">
                                    <option value="yes" th:selected="${row.groupWinner == 'yes'}">yes</option>
                                    <option value="maybe" th:selected="${row.groupWinner == 'maybe'}">maybe</option>
                                    <option value="no" th:selected="${row.groupWinner == 'no'}">no</option>
                                </select>
                            </td>
                            <td>
                                <select class="form-select form-select-sm" th:name="${'runnerUp' + row.rowIndex}">
                                    <option value="yes" th:selected="${row.runnerUp == 'yes'}">yes</option>
                                    <option value="maybe" th:selected="${row.runnerUp == 'maybe'}">maybe</option>
                                    <option value="no" th:selected="${row.runnerUp == 'no'}">no</option>
                                </select>
                            </td>
                            <td>
                                <select class="form-select form-select-sm" th:name="${'thirdPlace' + row.rowIndex}">
                                    <option value="yes" th:selected="${row.thirdPlace == 'yes'}">yes</option>
                                    <option value="maybe" th:selected="${row.thirdPlace == 'maybe'}">maybe</option>
                                    <option value="no" th:selected="${row.thirdPlace == 'no'}">no</option>
                                </select>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div th:if="${!groupsMode}" class="table-responsive shadow-sm rounded border">
            <table class="table table-striped table-sm mb-0 align-middle w-100">
                <colgroup>
                    <col style="width:8%">
                    <col style="width:27%">
                    <col style="width:4%">
                    <col style="width:27%">
                    <col style="width:27%">
                    <col style="width:7%">
                </colgroup>
                <thead class="table-dark">
                <tr>
                    <th>Match</th>
                    <th>Team 1</th>
                    <th></th>
                    <th>Team 2</th>
                    <th>Predicted Winner</th>
                    <th class="text-center">Disagree?</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row, stat : ${rows}">
                    <td th:text="${row.matchId}">M73</td>
                    <td th:utext="${row.team1Html}">Mexico</td>
                    <td>vs</td>
                    <td th:utext="${row.team2Html}">Canada</td>
                    <td th:utext="${row.predictedWinnerHtml}">Mexico (68%)</td>
                    <td class="text-center"><input class="form-check-input" type="checkbox" th:name="${'disagree' + stat.index}" th:checked="${row.disagree}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <button class="btn btn-primary mt-3" type="submit">Save Changes</button>
    </form>
</div>
</body>
</html>
