<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1" th:text="${comparison.label + ' Predictions vs Results'}">Historical comparison</h1>
            <p class="text-muted mb-0">Group-stage 90-minute outcome picks using the current production model.</p>
        </div>
        <a class="btn btn-outline-secondary" href="/">Back</a>
    </div>
    <div class="alert alert-primary">
        Correct: <strong th:text="${comparison.correct + ' / ' + comparison.total}">0 / 0</strong>
        <span class="ms-2" th:text="${'(' + comparison.accuracy + ')'}">(0%)</span>
    </div>
    <div class="table-responsive shadow-sm">
        <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-light"><tr><th>Match</th><th>Model W/D/L</th><th>Pick</th><th>Actual</th><th>Score</th><th>xG</th><th>Correct</th></tr></thead>
            <tbody>
            <tr th:each="m : ${comparison.matches}">
                <td th:text="${m.team1 + ' vs ' + m.team2}">Match</td>
                <td th:text="${m.homeProbability + ' / ' + m.drawProbability + ' / ' + m.awayProbability}">Probabilities</td>
                <td th:text="${m.predictedOutcome}">Home</td>
                <td th:text="${m.actualOutcome}">Away</td>
                <td th:text="${m.score}">0-0</td>
                <td th:text="${m.expectedGoals}">1.0 - 1.0</td>
                <td><span class="badge" th:classappend="${m.correct ? ' text-bg-success' : ' text-bg-danger'}" th:text="${m.correct ? 'Yes' : 'No'}">No</span></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
