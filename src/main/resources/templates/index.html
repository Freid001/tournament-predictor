<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Tournaments</h1>
    </div>
    <div th:if="${#lists.isEmpty(tournaments)}" class="alert alert-info">No tournaments found.</div>
    <div class="row g-3" th:if="${!#lists.isEmpty(tournaments)}">
        <div class="col-md-6 col-xl-4" th:each="t : ${tournaments}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h2 class="h5 card-title" th:text="${t.name}">world_cup_2026</h2>
                    <p class="card-text text-muted mb-2" th:text="${t.stage}">Group Setup complete</p>
                    <span class="badge text-bg-secondary" th:text="${t.completedSteps + ' / 8 complete'}">0 / 8 complete</span>
                </div>
                <div class="card-footer bg-white border-0 pt-0">
                    <a class="btn btn-primary" th:href="@{/tournament/{name}(name=${t.name})}">Predictions</a>
                    <a class="btn btn-outline-secondary disabled" href="#">Paths</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
