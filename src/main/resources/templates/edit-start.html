<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">
    <div th:replace="~{fragments :: roundNav}"></div>

    <form id="startForm" th:action="@{/edit/start(tournament=${tournament})}" method="post" onsubmit="return validateTeams()">
        <input type="hidden" name="rowCount" th:value="${#lists.size(rows)}">
        <div id="dupError" class="alert alert-danger d-none mb-3">Duplicate teams selected — each team must appear only once.</div>
        <div class="table-responsive shadow-sm rounded border">
            <table class="table table-striped table-sm mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th></th>
                    <th>Grp</th>
                    <th></th>
                    <th>Team</th>
                    <th class="text-center">Host</th>
                    <th>Age</th>
                    <th>Cohesion</th>
                    <th>Depth</th>
                    <th>Quality</th>
                    <th>Dropouts</th>
                    <th>Injury</th>
                    <th>Heat</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="row, stat : ${rows}">
                <tr style="cursor:pointer" onclick="toggleNotes(this)">
                    <td class="text-center pe-0" style="width:1.5rem">
                        <span class="expand-icon" style="font-size:.75em;opacity:.5"
                              th:text="${!row.dropoutNotes.isEmpty() or !row.injuryNotes.isEmpty() or !row.ageNotes.isEmpty() or !row.cohesionNotes.isEmpty() or !row.depthNotes.isEmpty() or !row.qualityNotes.isEmpty()} ? '▶' : '▷'">▶</span>
                    </td>
                    <td class="fw-semibold text-center">
                        <input type="hidden" th:name="${'group' + stat.index}" th:value="${row.group}">
                        <span th:text="${row.group}">A</span>
                    </td>
                    <td class="text-center team-flag-cell" th:utext="${row.teamFlagHtml}"></td>
                    <td style="min-width:140px">
                        <select class="form-select form-select-sm team-select" th:name="${'team' + stat.index}">
                            <option value="">— Select —</option>
                            <option th:each="t : ${allTeams}" th:value="${t}" th:text="${t}"
                                    th:selected="${t == row.team}"></option>
                        </select>
                    </td>
                    <td class="text-center"><input class="form-check-input" type="checkbox" th:name="${'host' + stat.index}" th:checked="${row.host}"></td>
                    <td>
                        <select class="form-select form-select-sm" th:name="${'squadAgeProfile' + stat.index}">
                            <option value="0" th:selected="${row.squadAgeProfile == 0}">Balanced</option>
                            <option value="1" th:selected="${row.squadAgeProfile == 1}">Young (-12)</option>
                            <option value="2" th:selected="${row.squadAgeProfile == 2}">Aging (-8)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm" th:name="${'squadCohesion' + stat.index}">
                            <option value="0" th:selected="${row.squadCohesion == 0}">Settled</option>
                            <option value="1" th:selected="${row.squadCohesion == 1}">Unsettled (-11)</option>
                            <option value="2" th:selected="${row.squadCohesion == 2}">Disrupted (-22)</option>
                            <option value="3" th:selected="${row.squadCohesion == 3}">Fractured (-45)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm" th:name="${'squadDepth' + stat.index}">
                            <option value="0" th:selected="${row.squadDepth == 0}">Good</option>
                            <option value="1" th:selected="${row.squadDepth == 1}">Limited (-10)</option>
                            <option value="2" th:selected="${row.squadDepth == 2}">Thin (-20)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm" th:name="${'squadQuality' + stat.index}">
                            <option value="0" th:selected="${row.squadQuality == 0}">Normal</option>
                            <option value="1" th:selected="${row.squadQuality == 1}">Good (+10)</option>
                            <option value="2" th:selected="${row.squadQuality == 2}">Exceptional (+20)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm" th:name="${'squadDropouts' + stat.index}">
                            <option value="0" th:selected="${row.squadDropouts == 0}">None</option>
                            <option value="1" th:selected="${row.squadDropouts == 1}">Minor (-18)</option>
                            <option value="2" th:selected="${row.squadDropouts == 2}">Sig. (-35)</option>
                            <option value="3" th:selected="${row.squadDropouts == 3}">Critical (-70)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm" th:name="${'injuryImpact' + stat.index}">
                            <option value="0" th:selected="${row.injuryImpact == 0}">None</option>
                            <option value="1" th:selected="${row.injuryImpact == 1}">Minor (-22)</option>
                            <option value="2" th:selected="${row.injuryImpact == 2}">Sig. (-45)</option>
                            <option value="3" th:selected="${row.injuryImpact == 3}">Critical (-90)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm" th:name="${'heatImpact' + stat.index}">
                            <option value="0" th:selected="${row.heatImpact == 0}">None</option>
                            <option value="1" th:selected="${row.heatImpact == 1}">Mild (+9)</option>
                            <option value="2" th:selected="${row.heatImpact == 2}">Mod. (+18)</option>
                            <option value="3" th:selected="${row.heatImpact == 3}">Strong (+35)</option>
                        </select>
                    </td>
                </tr>
                <tr th:id="${'notes-' + stat.index}" class="notes-row table-light" style="display:none">
                    <td colspan="12" class="py-2 px-3">
                        <div class="row g-2">
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">👶 Age</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'ageNotes' + stat.index}" th:text="${row.ageNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">🤝 Cohesion</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'cohesionNotes' + stat.index}" th:text="${row.cohesionNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">⬇️ Depth</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'depthNotes' + stat.index}" th:text="${row.depthNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">⭐ Quality</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'qualityNotes' + stat.index}" th:text="${row.qualityNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">👤 Dropouts</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'dropoutNotes' + stat.index}" th:text="${row.dropoutNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">🤕 Injury</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'injuryNotes' + stat.index}" th:text="${row.injuryNotes}"></textarea>
                            </div>
                        </div>
                    </td>
                </tr>
                </th:block>
                </tbody>
            </table>
        </div>
        <button class="btn btn-primary mt-3" type="submit">Save Group Setup</button>
    </form>
    <script th:inline="javascript">
        const ISO_CODES = JSON.parse(/*[[${isoCodesJson}]]*/ '{}');
        function validateTeams() {
            const selects = document.querySelectorAll('.team-select');
            const seen = new Set(), dupes = new Set();
            selects.forEach(s => {
                const v = s.value;
                if (v) { if (seen.has(v)) dupes.add(v); else seen.add(v); }
                s.classList.remove('is-invalid');
            });
            if (dupes.size > 0) {
                selects.forEach(s => { if (dupes.has(s.value)) s.classList.add('is-invalid'); });
                document.getElementById('dupError').classList.remove('d-none');
                return false;
            }
            return true;
        }

        function toggleNotes(row) {
            const detail = row.nextElementSibling;
            if (!detail || !detail.classList.contains('notes-row')) return;
            const isHidden = detail.style.display === 'none';
            detail.style.display = isHidden ? '' : 'none';
            const icon = row.querySelector('.expand-icon');
            if (icon) icon.textContent = isHidden ? '▼' : (icon.textContent === '▷' ? '▷' : '▶');
        }

        // Don't toggle when interacting with form controls inside the row
        document.querySelectorAll('tbody tr').forEach(tr => {
            tr.addEventListener('click', function(e) {
                if (e.target.closest('select, input, textarea, button, label')) e.stopPropagation();
            }, true);
        });
        document.querySelectorAll('.team-select').forEach(sel => {
            sel.addEventListener('change', function () {
                const row = this.closest('tr');
                const flagCell = row.querySelector('.team-flag-cell');
                if (!flagCell) return;
                const iso = ISO_CODES[this.value];
                flagCell.innerHTML = iso
                    ? '<span class="fi fi-' + iso.toLowerCase() + '" style="font-size:1.2rem"></span>'
                    : '';
            });
        });
    </script>
</div>
</body>
</html>
