<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">
    <div th:replace="~{fragments :: editHeader}"></div>

    <form id="startForm" th:action="@{/edit/start(tournament=${tournament})}" method="post" onsubmit="return validateTeams()">
        <input type="hidden" name="rowCount" th:value="${#lists.size(rows)}">
        <div id="dupError" class="alert alert-danger d-none mb-3">Duplicate teams selected — each team must appear only once.</div>
        <div class="table-responsive shadow-sm rounded border">
            <table class="table table-striped table-sm mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th style="width:28px" aria-label="Details"></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Draw group for the team. Four teams per group for World Cup 2026.">Grp</span></th>
                    <th aria-label="Flag"></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Team assigned to this group slot. Each team should appear once.">Team</span></th>
                    <th class="text-center"><span data-bs-toggle="tooltip" data-bs-title="Host-country boost only. Use yes for official hosts playing with home advantage; not for climate familiarity.">Host</span></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Squad age profile. Use Young for unusually inexperienced tournament squads; Aging for cores with several key 33+ players and recovery risk.">Age</span></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Chemistry/tactical disruption. Look for new coach, selection rows, political disruption, late reshuffles, or unsettled combinations.">Cohesion</span></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Replacement quality. Use Limited/Thin when quality drops sharply beyond the starters; also affects knockout fatigue sensitivity.">Bench Depth</span></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Chance creation and finishing relative to the team average. Changes xG only, not ELO.">Attack</span></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Preventing chances and goals relative to the team average. Changes opponent xG only, not ELO.">Defence</span></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Players absent from the final selected squad: ruled out before selection, coach omission, discipline, retirement, refusal, or federation dispute. If the player is selected but doubtful, limited, returning, or carrying a knock, use Injury instead.">Squad Omissions</span></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Current fitness for players still in the selected squad: doubtful starters, managed minutes, recent returns, carrying knocks, or selected players later ruled out. Do not use this for players already omitted from the squad.">Injury</span></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="Climate adaptation to hot/humid/altitude venues. Use for teams likely to handle conditions better than opponents.">Heat</span></th>
                    <th><span data-bs-toggle="tooltip" data-bs-title="FIFA confederation used for a small schedule-strength penalty in adjusted ELO. UEFA/CONMEBOL are baseline; CAF, AFC, CONCACAF and OFC subtract ELO.">Confederation</span></th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="row, stat : ${rows}">
                <tr style="cursor:pointer" onclick="toggleNotes(this)">
                    <td class="text-center text-muted" style="width:28px">
                        <span class="expand-icon" aria-hidden="true"></span>
                    </td>
                    <td class="fw-semibold text-center">
                        <input type="hidden" th:name="${'group' + stat.index}" th:value="${row.group}">
                        <span th:text="${row.group}">A</span>
                    </td>
                    <td class="text-center team-flag-cell" th:utext="${row.teamFlagHtml}"></td>
                    <td style="min-width:140px">
                        <select class="form-select form-select-sm team-select" th:name="${'team' + stat.index}">
                            <option value="">— Select —</option>
                            <option th:each="t : ${allTeams}" th:value="${t}" th:text="${t}"
                                    th:selected="${t == row.team}"></option>
                        </select>
                    </td>
                    <td class="text-center"><input class="form-check-input" type="checkbox" th:name="${'host' + stat.index}" th:checked="${row.host}"></td>
                    <td>
                        <select class="form-select form-select-sm signal-select" th:name="${'squadAgeProfile' + stat.index}">
                            <option value="0" th:selected="${row.squadAgeProfile == 0}">Balanced</option>
                            <option value="1" th:selected="${row.squadAgeProfile == 1}">Young (-12)</option>
                            <option value="2" th:selected="${row.squadAgeProfile == 2}">Aging (-8)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm signal-select" th:name="${'squadCohesion' + stat.index}">
                            <option value="0" th:selected="${row.squadCohesion == 0}">Settled</option>
                            <option value="1" th:selected="${row.squadCohesion == 1}">Unsettled (-11)</option>
                            <option value="2" th:selected="${row.squadCohesion == 2}">Disrupted (-22)</option>
                            <option value="3" th:selected="${row.squadCohesion == 3}">Fractured (-45)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm signal-select" th:name="${'squadDepth' + stat.index}">
                            <option value="-1" th:selected="${row.squadDepth == -1}">Excellent (+10)</option>
                            <option value="0" th:selected="${row.squadDepth == 0}">Good/deep</option>
                            <option value="1" th:selected="${row.squadDepth == 1}">Limited bench (-10)</option>
                            <option value="2" th:selected="${row.squadDepth == 2}">Thin bench (-20)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm quality-select signal-select" th:name="${'attackQuality' + stat.index}">
                            <option value="-2" th:selected="${row.attackQuality == -2}">Very weak (-2)</option>
                            <option value="-1" th:selected="${row.attackQuality == -1}">Weak (-1)</option>
                            <option value="0" th:selected="${row.attackQuality == 0}">Average</option>
                            <option value="1" th:selected="${row.attackQuality == 1}">Strong (+1)</option>
                            <option value="2" th:selected="${row.attackQuality == 2}">Elite (+2)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm quality-select signal-select" th:name="${'defenceQuality' + stat.index}">
                            <option value="-2" th:selected="${row.defenceQuality == -2}">Very weak (-2)</option>
                            <option value="-1" th:selected="${row.defenceQuality == -1}">Weak (-1)</option>
                            <option value="0" th:selected="${row.defenceQuality == 0}">Average</option>
                            <option value="1" th:selected="${row.defenceQuality == 1}">Strong (+1)</option>
                            <option value="2" th:selected="${row.defenceQuality == 2}">Elite (+2)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm signal-select" th:name="${'squadDropouts' + stat.index}">
                            <option value="0" th:selected="${row.squadDropouts == 0}">None</option>
                            <option value="1" th:selected="${row.squadDropouts == 1}">Minor (-18)</option>
                            <option value="2" th:selected="${row.squadDropouts == 2}">Significant (-35)</option>
                            <option value="3" th:selected="${row.squadDropouts == 3}">Critical (-70)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm signal-select" th:name="${'injuryImpact' + stat.index}">
                            <option value="0" th:selected="${row.injuryImpact == 0}">None</option>
                            <option value="1" th:selected="${row.injuryImpact == 1}">Minor (-22)</option>
                            <option value="2" th:selected="${row.injuryImpact == 2}">Significant (-45)</option>
                            <option value="3" th:selected="${row.injuryImpact == 3}">Critical (-90)</option>
                        </select>
                    </td>
                    <td>
                        <select class="form-select form-select-sm signal-select" th:name="${'heatImpact' + stat.index}">
                            <option value="0" th:selected="${row.heatImpact == 0}">None</option>
                            <option value="1" th:selected="${row.heatImpact == 1}">Mild (+9)</option>
                            <option value="2" th:selected="${row.heatImpact == 2}">Moderate (+18)</option>
                            <option value="3" th:selected="${row.heatImpact == 3}">Strong (+35)</option>
                        </select>
                    </td>
                    <td style="min-width:130px">
                        <select class="form-select form-select-sm" th:name="${'confederation' + stat.index}">
                            <option value="" th:selected="${#strings.isEmpty(row.confederation)}">—</option>
                            <option value="UEFA" th:selected="${row.confederation == 'UEFA'}">UEFA</option>
                            <option value="CONMEBOL" th:selected="${row.confederation == 'CONMEBOL'}">CONMEBOL</option>
                            <option value="CONCACAF" th:selected="${row.confederation == 'CONCACAF'}">CONCACAF</option>
                            <option value="CAF" th:selected="${row.confederation == 'CAF'}">CAF</option>
                            <option value="AFC" th:selected="${row.confederation == 'AFC'}">AFC</option>
                            <option value="OFC" th:selected="${row.confederation == 'OFC'}">OFC</option>
                        </select>
                    </td>
                </tr>
                <tr th:id="${'notes-' + stat.index}" class="notes-row table-light" style="display:none">
                    <td colspan="14" class="py-2 px-3">
                        <div class="row g-2">
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">👶 Age</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'ageNotes' + stat.index}" th:text="${row.ageNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">🤝 Cohesion</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'cohesionNotes' + stat.index}" th:text="${row.cohesionNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">⬇️ Bench Depth</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'depthNotes' + stat.index}" th:text="${row.depthNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">⭐ Quality</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'qualityNotes' + stat.index}" th:text="${row.qualityNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">👤 Squad Omissions</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'dropoutNotes' + stat.index}" th:text="${row.dropoutNotes}"></textarea>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label mb-1 small text-muted">🤕 Injury</label>
                                <textarea class="form-control form-control-sm" rows="3"
                                          th:name="${'injuryNotes' + stat.index}" th:text="${row.injuryNotes}"></textarea>
                            </div>
                        </div>
                    </td>
                </tr>
                </th:block>
                </tbody>
            </table>
        </div>
        <button class="btn btn-primary mt-3" type="submit">Save</button>
    </form>
    <script th:inline="javascript">
        const ISO_CODES = JSON.parse(/*[[${isoCodesJson}]]*/ '{}');
        function validateTeams() {
            const selects = document.querySelectorAll('.team-select');
            const seen = new Set(), dupes = new Set();
            selects.forEach(s => {
                const v = s.value;
                if (v) { if (seen.has(v)) dupes.add(v); else seen.add(v); }
                s.classList.remove('is-invalid');
            });
            if (dupes.size > 0) {
                selects.forEach(s => { if (dupes.has(s.value)) s.classList.add('is-invalid'); });
                document.getElementById('dupError').classList.remove('d-none');
                return false;
            }
            return true;
        }

        function toggleNotes(row) {
            const detail = row.nextElementSibling;
            if (!detail || !detail.classList.contains('notes-row')) return;
            const isHidden = detail.style.display === 'none';
            detail.style.display = isHidden ? '' : 'none';
            const icon = row.querySelector('.expand-icon');
            if (icon) icon.classList.toggle('expanded', isHidden);
        }

        // Don't toggle when interacting with form controls inside the row
        document.querySelectorAll('tbody tr').forEach(tr => {
            tr.addEventListener('click', function(e) {
                if (e.target.closest('select, input, textarea, button, label')) e.stopPropagation();
            }, true);
        });

        const signalClasses = ['quality-level-neg-2', 'quality-level-neg-mid', 'quality-level-neg-1', 'quality-level-0', 'quality-level-pos-1', 'quality-level-pos-mid', 'quality-level-pos-2'];
        function signalLevelClass(select) {
            const value = select.value;
            const name = select.name;
            if (name.startsWith('attackQuality') || name.startsWith('defenceQuality'))
                return { '-2': signalClasses[0], '-1': signalClasses[2], '0': signalClasses[3], '1': signalClasses[4], '2': signalClasses[6] }[value];
            if (name.startsWith('squadAgeProfile'))
                return { '0': signalClasses[3], '1': signalClasses[1], '2': signalClasses[2] }[value];
            if (name.startsWith('squadDepth'))
                return { '-1': signalClasses[6], '0': signalClasses[3], '1': signalClasses[2], '2': signalClasses[0] }[value];
            if (name.startsWith('heatImpact'))
                return { '0': signalClasses[3], '1': signalClasses[4], '2': signalClasses[5], '3': signalClasses[6] }[value];
            return { '0': signalClasses[3], '1': signalClasses[2], '2': signalClasses[1], '3': signalClasses[0] }[value];
        }
        function updateSignalSelect(select) {
            select.classList.remove(...signalClasses);
            const levelClass = signalLevelClass(select);
            if (levelClass) select.classList.add(levelClass);
        }
        document.querySelectorAll('.signal-select').forEach(select => {
            updateSignalSelect(select);
            select.addEventListener('change', () => updateSignalSelect(select));
        });

        document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
            new bootstrap.Tooltip(el);
        });
        document.querySelectorAll('.team-select').forEach(sel => {
            sel.addEventListener('change', function () {
                const row = this.closest('tr');
                const flagCell = row.querySelector('.team-flag-cell');
                if (!flagCell) return;
                const iso = ISO_CODES[this.value];
                flagCell.innerHTML = iso
                    ? '<span class="fi fi-' + iso.toLowerCase() + '" style="font-size:1.2rem"></span>'
                    : '';
            });
        });
    </script>
</div>
<th:block th:replace="~{fragments :: keyboardNavScript}"></th:block>
</body>
</html>
