<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: pageHead}"></head>
<body>
<nav th:replace="~{fragments :: navbar}"></nav>
<div class="container pb-4">
    <div th:replace="~{fragments :: roundNav}"></div>
    <div th:replace="~{fragments :: editLink}"></div>

    <div th:if="${groupsMode}">
        <div th:utext="${groupSimulationHtml}"></div>
        <div th:utext="${groupMatchesHtml}"></div>
    </div>

    <script th:if="${hasPrevRound or hasNextRound}">
      document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft' && [[${prevViewEnabled}]]) location.href = '[[${prevViewUrl}]]';
        if (e.key === 'ArrowRight' && [[${nextViewEnabled}]]) location.href = '[[${nextViewUrl}]]';
      });
    </script>

    <div th:if="${!groupsMode}" class="table-responsive shadow-sm rounded border">
        <table class="table table-striped table-sm mb-0 align-middle">
            <thead class="table-dark">
            <tr>
                <th>Match</th>
                <th>Team 1</th>
                <th></th>
                <th>Team 2</th>
                <th>Predicted Winner</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${rows}">
                <td th:text="${row.matchId}">M73</td>
                <td th:classappend="${row.team1Winner ? ' fw-bold table-success' : ''}" th:utext="${row.team1Html}">Mexico</td>
                <td>vs</td>
                <td th:classappend="${row.team2Winner ? ' fw-bold table-success' : ''}" th:utext="${row.team2Html}">Canada</td>
                <td class="fw-semibold" th:utext="${row.predictedWinnerHtml}">Mexico (68%)</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<th:block th:replace="~{fragments :: toggleGroupDetailScript}"></th:block>
<th:block th:replace="~{fragments :: keyboardNavScript}"></th:block>
</body>
</html>
